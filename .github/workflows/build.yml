name: Build & Package

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build shaded jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build package
        run: mvn -B -ntp clean package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yanshell-${{ github.sha }}
          path: target/yanshell.jar
          if-no-files-found: error

  release:
    name: Release on tag
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build package
        run: mvn -B -ntp clean package

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: yanshell-${{ github.sha }}
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/yanshell.jar
            target/yanshell.jar
          generate_release_notes: true
